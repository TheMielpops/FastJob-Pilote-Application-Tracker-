<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f1f3f4;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 18px 16px 14px;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: .2px; }
    .header-sub {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px;
    }
    .header-sub small { font-size: 11px; opacity: .8; }
    .refresh-btn {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 12px; padding: 3px 10px; font-size: 11px; cursor: pointer;
    }
    .refresh-btn:hover { background: rgba(255,255,255,.35); }

    /* ---- Sections ---- */
    .section { padding: 12px 14px; }
    .section + .section { padding-top: 4px; }
    .sec-title {
      font-size: 10px; font-weight: 700; color: #5f6368;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 9px;
    }

    /* ---- Stat cards ---- */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
    .stat-card {
      background: #fff; border-radius: 10px; padding: 10px 8px;
      text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .stat-card .num { font-size: 24px; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: 10px; color: #5f6368; margin-top: 3px; }
    .blue   .num { color: #1a73e8; }
    .amber  .num { color: #f9ab00; }
    .green  .num { color: #34a853; }
    .red    .num { color: #ea4335; }
    .purple .num { color: #9334ea; }
    .teal   .num { color: #00897b; }

    /* ---- Progress bar ---- */
    .progress-section { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .prog-label { display: flex; justify-content: space-between; font-size: 11px; color: #5f6368; margin-bottom: 5px; }
    .prog-bar { height: 6px; border-radius: 3px; background: #e8eaed; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #34a853, #1a73e8); transition: width .4s; }

    /* ---- Buttons ---- */
    .btn {
      display: block; width: 100%; padding: 9px 12px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 7px;
      transition: filter .15s, transform .1s; text-align: left;
    }
    .btn:hover { filter: brightness(.93); }
    .btn:active { transform: scale(.98); }
    .btn-blue   { background: #1a73e8; color: #fff; }
    .btn-amber  { background: #fff3cd; color: #6d4c00; }
    .btn-green  { background: #d1e7dd; color: #0a3622; }
    .btn-light  { background: #e8f0fe; color: #174ea6; }
    .btn-icon   { margin-right: 6px; }

    /* ---- Action items ---- */
    .action-list { display: flex; flex-direction: column; gap: 7px; }
    .action-item {
      background: #fff; border-radius: 8px; padding: 10px 12px;
      border-left: 4px solid #f9ab00; box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }
    .action-item.overdue { border-color: #ea4335; }
    .action-item.today   { border-color: #1a73e8; }
    .action-tag {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
      display: inline-block; margin-bottom: 4px;
    }
    .action-tag.r1         { background: #fff3cd; color: #6d4c00; }
    .action-tag.r2         { background: #ffe5d0; color: #7c3304; }
    .action-tag.overdue    { background: #f8d7da; color: #6e1c23; }
    .action-name { font-weight: 600; font-size: 13px; }
    .action-detail { font-size: 11px; color: #5f6368; margin-top: 2px; }

    /* ---- Automation badge ---- */
    .auto-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .auto-badge.on  { background: #d1e7dd; color: #0a3622; }
    .auto-badge.off { background: #f8d7da; color: #6e1c23; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #34a853; }
    .dot.red   { background: #ea4335; }

    /* ---- Utility ---- */
    .divider { height: 1px; background: #e0e0e0; margin: 4px 14px; }
    .empty  { text-align: center; padding: 14px 0; color: #9aa0a6; font-size: 12px; }
    .toast  {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #202124; color: #fff; padding: 8px 16px; border-radius: 20px;
      font-size: 12px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ---- Spinner ---- */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>📧 Alternance Tracker</h1>
    <div class="header-sub">
      <small id="ts">Chargement…</small>
      <button class="refresh-btn" onclick="loadAll()">⟳ Actualiser</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="sec-title">Aperçu</div>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card blue"><div class="num">–</div><div class="lbl">Total</div></div>
    </div>
  </div>

  <!-- Progress -->
  <div class="section" style="padding-top:0">
    <div class="progress-section" id="prog-section" style="display:none">
      <div class="prog-label">
        <span>Taux de réponse</span><span id="prog-pct">0 %</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Actions rapides -->
  <div class="section">
    <div class="sec-title">Actions rapides</div>
    <button class="btn btn-blue"  id="btn-send"  onclick="doSendPending()"><span class="btn-icon">📤</span>Envoyer candidatures en attente</button>
    <button class="btn btn-amber" id="btn-relance" onclick="doSendFollowUps()"><span class="btn-icon">🔄</span>Lancer les relances du jour</button>
    <button class="btn btn-green" id="btn-check"  onclick="doCheckReplies()"><span class="btn-icon">✉️</span>Vérifier les réponses</button>
    <button class="btn btn-light" onclick="openSettings()"><span class="btn-icon">⚙️</span>Paramètres & Modèles</button>
  </div>

  <div class="divider"></div>

  <!-- Calendrier des actions -->
  <div class="section">
    <div class="sec-title">📅 Actions à venir – 7 prochains jours</div>
    <div class="action-list" id="upcoming"></div>
  </div>

  <div class="divider"></div>

  <!-- Automatisation -->
  <div class="section">
    <div class="sec-title">Automatisation</div>
    <div id="auto-status" style="margin-bottom:8px">–</div>
    <button class="btn btn-light" onclick="doSetupAuto()"><span class="btn-icon">🔧</span>Activer l'automatisation quotidienne</button>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

<script>
  function loadAll() {
    setTs('Actualisation…');
    google.script.run
      .withSuccessHandler(function(d) {
        renderStats(d.stats);
        renderUpcoming(d.upcoming);
        renderAuto(d.trigger);
        setTs(now());
      })
      .withFailureHandler(err)
      .apiGetDashboardData();
  }

  function renderStats(s) {
    const g = document.getElementById('stats-grid');
    const total = s.total || 0;
    const reponse = s.reponseRecue || 0;
    const pct = total > 0 ? Math.round(reponse / total * 100) : 0;

    g.innerHTML = `
      <div class="stat-card blue">  <div class="num">${s.total}</div>        <div class="lbl">Total</div></div>
      <div class="stat-card amber"> <div class="num">${s.aEnvoyer}</div>     <div class="lbl">À envoyer</div></div>
      <div class="stat-card blue">  <div class="num">${s.envoye}</div>       <div class="lbl">Envoyés</div></div>
      <div class="stat-card amber"> <div class="num">${s.r1Envoye}</div>     <div class="lbl">Relance 1</div></div>
      <div class="stat-card red">   <div class="num">${s.r2Envoye}</div>     <div class="lbl">Relance 2</div></div>
      <div class="stat-card green"> <div class="num">${s.reponseRecue}</div> <div class="lbl">Réponses</div></div>
      <div class="stat-card purple"><div class="num">${s.entretien}</div>    <div class="lbl">Entretiens</div></div>
      <div class="stat-card teal">  <div class="num">${s.accepte}</div>      <div class="lbl">Acceptés</div></div>
      <div class="stat-card ${s.relancesDuJour > 0 ? 'red' : 'blue'}">
        <div class="num">${s.relancesDuJour}</div><div class="lbl">Relances auj.</div>
      </div>`;

    const ps = document.getElementById('prog-section');
    ps.style.display = total > 0 ? 'block' : 'none';
    document.getElementById('prog-pct').textContent = pct + ' %';
    document.getElementById('prog-fill').style.width = pct + '%';
  }

  function renderUpcoming(actions) {
    const el = document.getElementById('upcoming');
    if (!actions || actions.length === 0) {
      el.innerHTML = '<div class="empty">✅ Aucune action dans les 7 prochains jours</div>';
      return;
    }
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);

    el.innerHTML = actions.map(function(a) {
      const d = new Date(a.date);
      const isOverdue = d < today;
      const isToday   = d.getTime() === today.getTime();
      const cls = isOverdue ? 'overdue' : isToday ? 'today' : '';
      const tagCls = isOverdue ? 'overdue' : a.type.includes('2') ? 'r2' : 'r1';
      let dateLabel = fmtDate(d);
      if (isOverdue) dateLabel = '⚠️ En retard (' + dateLabel + ')';
      else if (isToday) dateLabel = "Aujourd'hui";
      else if (d.getTime() === tomorrow.getTime()) dateLabel = 'Demain';
      return '<div class="action-item ' + cls + '">'
        + '<span class="action-tag ' + tagCls + '">' + a.type + '</span>'
        + '<div class="action-name">' + esc(a.nom) + '</div>'
        + '<div class="action-detail">' + esc(a.entreprise) + ' · ' + dateLabel + '</div>'
        + '</div>';
    }).join('');
  }

  function renderAuto(t) {
    const el = document.getElementById('auto-status');
    if (t.active) {
      el.innerHTML = '<div class="auto-badge on"><span class="dot green"></span>' + t.description + '</div>';
    } else {
      el.innerHTML = '<div class="auto-badge off"><span class="dot red"></span>' + t.description + '</div>';
    }
  }

  // ---- Async actions ----

  function doSendPending() {
    busy('btn-send', true);
    google.script.run
      .withSuccessHandler(function(n) {
        busy('btn-send', false);
        toast('📤 ' + n + ' candidature(s) envoyée(s)');
        loadAll();
      })
      .withFailureHandler(function(e) { busy('btn-send', false); err(e); })
      .apiSendPending();
  }

  function doSendFollowUps() {
    busy('btn-relance', true);
    google.script.run
      .withSuccessHandler(function(n) {
        busy('btn-relance', false);
        toast('🔄 ' + n + ' relance(s) envoyée(s)');
        loadAll();
      })
      .withFailureHandler(function(e) { busy('btn-relance', false); err(e); })
      .apiSendFollowUps();
  }

  function doCheckReplies() {
    busy('btn-check', true);
    google.script.run
      .withSuccessHandler(function(n) {
        busy('btn-check', false);
        toast('✉️ ' + n + ' nouvelle(s) réponse(s)');
        loadAll();
      })
      .withFailureHandler(function(e) { busy('btn-check', false); err(e); })
      .apiCheckReplies();
  }

  function doSetupAuto() {
    google.script.run
      .withSuccessHandler(function(t) {
        renderAuto(t);
        toast('🔧 Automatisation activée !');
      })
      .withFailureHandler(err)
      .apiSetupAutomation();
  }

  function openSettings() {
    google.script.run.showSettings();
  }

  // ---- Helpers ----

  function busy(id, on) {
    const b = document.getElementById(id);
    if (!b) return;
    b.disabled = on;
    if (on) {
      b._orig = b.innerHTML;
      b.innerHTML = '<span class="spinner"></span>En cours…';
    } else {
      b.innerHTML = b._orig;
    }
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function setTs(msg) { document.getElementById('ts').textContent = msg; }
  function now() {
    const d = new Date();
    return 'Mis à jour ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function pad(n) { return n.toString().padStart(2,'0'); }
  function fmtDate(d) { return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear(); }
  function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function err(e) { toast('❌ Erreur : ' + (e.message || e)); }

  loadAll();
  setInterval(loadAll, 60000);
</script>
</body>
</html>
